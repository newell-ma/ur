name: Publish

on:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore

      - run: dotnet build --no-restore

      # Unit / integration tests
      - run: dotnet run --no-build --project tests/RoyalGameOfUr.Engine.Tests/
      - run: dotnet run --no-build --project tests/RoyalGameOfUr.Server.Tests/
      - run: dotnet run --no-build --project tests/RoyalGameOfUr.Web.Tests/

      # Install Playwright browsers for E2E
      - run: pwsh tests/RoyalGameOfUr.E2E/bin/Debug/net10.0/playwright.ps1 install chromium --with-deps

      # E2E tests (stock Chromium, no channel)
      - run: dotnet run --no-build --project tests/RoyalGameOfUr.E2E/
        env:
          PLAYWRIGHT_BROWSER_CHANNEL: ""

      # Upload Playwright artifacts on failure
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-artifacts
          path: tests/RoyalGameOfUr.E2E/bin/Debug/net10.0/playwright-artifacts/
          retention-days: 7

  publish:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
